version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vincey
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  redis:
    image: redis:7
    ports:
      - '6379:6379'

  backend:
    build:
      context: .
      target: backend
    env_file: .env.example
    depends_on: [db, redis]
    ports:
      - '5000:5000'

  frontend:
    build:
      context: .
      target: frontend
    env_file: .env.example
    depends_on: [backend]
    ports:
      - '3000:3000'

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - '80:80'
    depends_on: [frontend, backend]

volumes:
  postgres_data:
